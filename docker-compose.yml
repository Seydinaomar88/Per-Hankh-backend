services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: per-ankh-app
    working_dir: /var/www
    volumes:
      - "C:/Users/7MAKSACOD PC/per-ankh-backend:/var/www"
    depends_on:
      - db
      - redis
    networks:
      - per-ankh-network

  webserver:
    image: nginx:alpine
    container_name: per-ankh-nginx
    ports:
      - "8000:80"
    volumes:
      - "C:/Users/7MAKSACOD PC/per-ankh-backend:/var/www"
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - per-ankh-network

  reverb:
    image: per-ankh-backend-app
    container_name: per-ankh-reverb
    working_dir: /var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8085
    ports:
      - "8085:8085"
    volumes:
      - "C:/Users/7MAKSACOD PC/per-ankh-backend:/var/www"
    networks:
      - per-ankh-network
    depends_on:
      - app
    environment:
      - REVERB_SERVER_HOST=0.0.0.0
      - REVERB_SERVER_PORT=8085

  socketio:
    image: node:18-alpine
    container_name: per-ankh-socketio
    working_dir: /var/www
    command: node socket-server.cjs
    ports:
      - "3001:3001"
    volumes:
      - "C:/Users/7MAKSACOD PC/per-ankh-backend:/var/www"
    networks:
      - per-ankh-network
    environment:
      - NODE_ENV=production

  db:
    image: mysql:8
    container_name: per-ankh-db
    restart: always
    environment:
      MYSQL_DATABASE: projet_perankh
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - per-ankh-network

  redis:
    image: redis:7-alpine
    container_name: per-ankh-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - per-ankh-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: per-ankh-phpmyadmin
    restart: always
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db
    networks:
      - per-ankh-network

  mailhog:
    image: mailhog/mailhog
    container_name: per-ankh-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - per-ankh-network

networks:
  per-ankh-network:
    driver: bridge

volumes:
  db_data: