services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: per-ankh-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - redis
    networks:
      - per-ankh-network

  webserver:
    image: nginx:alpine
    container_name: per-ankh-nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf  # ← Chemin corrigé
    depends_on:
      - app
    networks:
      - per-ankh-network

  db:
    image: mysql:8
    container_name: per-ankh-db
    restart: always
    environment:
      MYSQL_DATABASE: projet_perankh
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - per-ankh-network

  redis:
    image: redis:7-alpine
    container_name: per-ankh-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - per-ankh-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: per-ankh-phpmyadmin
    restart: always
    ports:
      - "8082:80"  # Changé de 8080 à 8082 pour éviter conflit
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db
    networks:
      - per-ankh-network

networks:
  per-ankh-network:
    driver: bridge

volumes:
  db_data: