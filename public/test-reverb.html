<!DOCTYPE html>
<html>
<head>
    <title>PER ANKH - Realtime Test</title>
    <meta name="csrf-token" content="{{ csrf_token() }}"> <!-- Important pour Laravel -->
</head>
<body>
    <h1>PER ANKH Workspace 7 - Realtime Test</h1>
    <div id="status">Initialisation...</div>
    <div id="events"></div>

    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script>
        // Récupérer le token CSRF depuis le meta tag
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        
        Pusher.logToConsole = true;
        
        const pusher = new Pusher('cwzlhdz6usudnzyhdkz4', {
            cluster: 'mt1',
            wsHost: '127.0.0.1',
            wsPort: 8080,
            forceTLS: false,
            enabledTransports: ['ws']
        });
        
        pusher.connection.bind('connected', () => {
            console.log('✅ Connecté! Socket ID:', pusher.connection.socket_id);
            document.getElementById('status').innerHTML = '✅ Connecté à Reverb';
        });
        
        const channel = pusher.subscribe('workspace.7');
        
        channel.bind('pusher:subscription_succeeded', () => {
            console.log('✅ Abonné au canal workspace.7!');
            document.getElementById('status').innerHTML += '<br>✅ Abonné au canal';
        });
        
        channel.bind('task.moved', (data) => {
            console.log('🎯 Événement reçu:', data);
            const eventsDiv = document.getElementById('events');
            eventsDiv.innerHTML = `
                <div style="border:2px solid green; padding:10px; margin:10px 0; background:#e8f5e9;">
                    <strong>🎯 TÂCHE DÉPLACÉE!</strong><br>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                    Heure: ${new Date().toLocaleTimeString()}
                </div>
            ` + eventsDiv.innerHTML;
        });
        
        // Fonction de test avec CSRF token
        window.testEvent = async () => {
            try {
                const response = await fetch('http://127.0.0.1:8000/test-broadcast', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-TOKEN': csrfToken,  // Ajout du token CSRF
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        workspace_id: 7,
                        message: 'Test ' + new Date().toLocaleTimeString()
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const result = await response.json();
                console.log('Événement envoyé:', result);
                alert('Événement envoyé avec succès!');
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur: ' + error.message);
            }
        };
    </script>
    
    <button onclick="testEvent()" style="margin-top:20px;padding:10px;">Tester l'envoi d'événement</button>
</body>
</html>
